<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi do Eval?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style>
    :root {
      /* Manifest palette */
      --background: #0d1117;
      --background-subtle: #141b24;
      --background-muted: #21262d;
      --background-emphasis: #30363d;
      --foreground: #e6edf3;
      --foreground-muted: #8b949e;
      --foreground-subtle: #7d8590;
      --border-default: #30363d;
      --border-muted: #21262d;
      --accent-blue: #58a6ff;
      --accent-green: #89d185;
      --accent-red: #f85149;
      --accent-orange: #d29922;

      /* Score colors */
      --score-green: #89d185;
      --score-yellow: #d29922;
      --score-red: #f85149;

      /* Layout */
      --sidebar-width: 360px;

      /* Pico overrides */
      --pico-font-family: 'IBM Plex Sans', sans-serif;
      --pico-font-family-monospace: 'IBM Plex Mono', monospace;
      --pico-background-color: var(--background);
      --pico-card-background-color: var(--background-subtle);
      --pico-card-sectioning-background-color: var(--background-subtle);
      --pico-color: var(--foreground);
      --pico-muted-color: var(--foreground-muted);
      --pico-muted-border-color: var(--border-default);
      --pico-primary: var(--accent-green);
      --pico-primary-inverse: var(--background);
      --pico-code-background-color: var(--background-muted);
      --pico-border-radius: 0;
      --pico-card-border-radius: 0;
    }

    /* Reset all border-radius from Pico */
    *, *::before, *::after {
      border-radius: 0 !important;
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-size: 14px;
    }

    /* ---------- Shell layout ---------- */
    .shell {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      height: 100vh;
    }

    /* ---------- Sidebar ---------- */
    .sidebar {
      background: var(--background);
      border-right: 1px solid var(--border-default);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 1.25rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border-default);
      flex-shrink: 0;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }
    .sidebar-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }
    .sidebar-header small {
      color: var(--foreground-subtle);
      font-size: 0.82rem;
    }
    .run-list {
      list-style: none;
      margin: 0;
      padding: 0;
      overflow-y: auto;
      flex: 1 1 auto;
      /* Force top-alignment: override any centering from Pico or flex defaults */
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
    }
    .run-item {
      padding: 0.45rem 1.75rem;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background-color 120ms ease, border-color 120ms ease;
    }
    .run-item:hover {
      background-color: var(--background-subtle);
    }
    .run-item.active {
      background-color: var(--background-subtle);
      border-left-color: var(--accent-green);
    }
    .run-item-top {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .run-item-name {
      font-weight: 600;
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .run-item-meta {
      display: flex;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--foreground-subtle);
      margin-top: 0.1rem;
    }

    /* ---------- Score badge ---------- */
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 1.9rem;
      padding: 0.05rem 0.35rem;
      font-size: 0.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--background);
      flex-shrink: 0;
      line-height: 1.4;
    }

    /* ---------- Main area ---------- */
    .main {
      overflow-y: auto;
      padding: 1.25rem 1.75rem 3rem;
    }
    .main h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.6rem;
      margin-top: 0;
    }
    .main h3 {
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--foreground-subtle);
      margin-top: 2rem;
      margin-bottom: 0.6rem;
    }

    /* ---------- Meta bar (compact inline) ---------- */
    .meta-grid {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0;
      margin-bottom: 0.75rem;
      padding: 0.3rem 0;
    }
    .meta-card {
      display: inline-flex;
      align-items: baseline;
      gap: 0.3rem;
      padding: 0 0.65rem;
      border-right: 1px solid var(--border-default);
      background: none;
      border-top: none;
      border-bottom: none;
      border-left: none;
    }
    .meta-card:first-child {
      padding-left: 0;
    }
    .meta-card:last-child,
    .meta-card:last-of-type {
      border-right: none;
    }
    .meta-card dt {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--foreground-subtle);
      margin-bottom: 0;
      white-space: nowrap;
    }
    .meta-card dd {
      margin: 0;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--foreground);
      white-space: nowrap;
    }
    .meta-card dd code {
      font-size: 0.85rem;
      font-weight: 400;
    }

    /* ---------- Content cards ---------- */
    .content-card {
      background: var(--background-subtle);
      border: 1px solid var(--border-default);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .content-card h3 {
      margin-top: 0;
    }
    .content-card h3:first-child {
      margin-top: 0;
    }

    /* ---------- Score bars ---------- */
    .score-section {
      margin-bottom: 0;
      max-width: 640px;
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }
    .score-label {
      width: 130px;
      font-size: 0.9rem;
      flex-shrink: 0;
      text-align: right;
      color: var(--foreground-muted);
    }
    .score-bar-track {
      flex: 1;
      height: 10px;
      background: var(--background);
      border: none;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      transition: width 400ms ease;
    }
    .score-value {
      width: 2.5rem;
      font-size: 0.9rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: right;
      flex-shrink: 0;
    }
    .score-layout {
      display: flex;
      align-items: stretch;
      gap: 0;
    }
    .score-bars {
      flex: 1;
      min-width: 0;
    }
    .score-overall {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 0.75rem 0.75rem 0.5rem;
      background: var(--background);
      flex-shrink: 0;
      min-width: 5.5rem;
    }
    .score-overall-value {
      font-size: 2.2rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .score-overall-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--foreground-subtle);
      margin-top: 0.35rem;
    }

    /* ---------- Findings ---------- */
    .findings-list {
      max-width: 720px;
      list-style: disc;
      padding-left: 1.25rem;
      margin: 0;
    }
    .finding-item {
      font-size: 0.9rem;
      line-height: 1.55;
      padding: 0.05rem 0;
      margin-bottom: 0.1rem;
      color: var(--foreground-muted);
    }
    .finding-item::marker {
      color: var(--foreground-subtle);
    }

    /* ---------- Judge reasons ---------- */
    .reason-list {
      max-width: 720px;
    }
    .reason-block {
      margin-bottom: 1.25rem;
    }
    .reason-block h4 {
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
      margin-top: 0;
      padding-top: 0.5rem;
    }
    .reason-block p {
      font-size: 0.9rem;
      color: var(--foreground-muted);
      margin: 0;
      line-height: 1.55;
    }

    /* ---------- Timeline filter pills ---------- */
    .timeline-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.75rem;
    }
    .filter-pill {
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      background: transparent;
      border: 1px solid var(--foreground-subtle);
      color: var(--foreground-subtle);
      cursor: pointer;
      font-family: var(--pico-font-family);
      transition: background 100ms ease, color 100ms ease;
    }
    .filter-pill:hover {
      color: var(--foreground);
    }
    .filter-pill.active {
      background: var(--accent-blue);
      color: var(--background);
      border-color: var(--accent-blue);
    }

    /* ---------- Unified timeline ---------- */
    .log-list {
      border: 1px solid var(--border-muted);
    }
    .log-list > :nth-child(odd) {
      background: var(--background);
    }
    .timeline-row {
      display: grid;
      grid-template-columns: 5.5rem 4.5rem 1fr;
      column-gap: 0.75rem;
      padding: 0.55rem 0.75rem;
      font-size: 0.85rem;
      align-items: baseline;
    }
    .kind-badge {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.1rem 0.35rem;
      text-align: center;
      white-space: nowrap;
    }
    .kind-badge.kind-tool { background: #1e3a5f; color: #93c5fd; }
    .kind-badge.kind-file { background: #713f12; color: #fde68a; }
    .kind-badge.kind-plugin { background: #3b1f6e; color: #c4b5fd; }
    .kind-badge.kind-test { background: #22543d; color: #86efac; }
    .kind-badge.kind-phase { background: #4a2020; color: #fca5a5; }
    .timeline-content {
      min-width: 0;
    }
    .timeline-ts {
      color: var(--foreground-subtle);
      font-family: var(--pico-font-family-monospace, monospace);
      font-size: 0.8rem;
      flex-shrink: 0;
    }
    .tool-name {
      font-weight: 600;
      font-size: 0.85rem;
    }
    .tool-args {
      color: var(--foreground-subtle);
      font-family: var(--pico-font-family-monospace, monospace);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 500px;
    }
    .tool-result {
      font-family: var(--pico-font-family-monospace, monospace);
      font-size: 0.8rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-all;
      background: var(--background-muted);
      padding: 0.5rem 0.6rem;
      margin-top: 0.25rem;
      max-height: 250px;
      overflow-y: auto;
    }
    .file-write-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
    }
    .file-path {
      font-family: var(--pico-font-family-monospace, monospace);
      font-size: 0.82rem;
    }
    .label-tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.05rem 0.35rem;
      background: var(--background-emphasis);
      color: var(--foreground-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      font-weight: 600;
    }
    .label-tag.test { background: #22543d; color: #86efac; }
    .label-tag.production { background: #713f12; color: #fde68a; }
    .label-tag.config { background: #1e3a5f; color: #93c5fd; }

    /* ---------- Phase change timeline ---------- */
    .phase-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.85rem;
    }
    .phase-arrow {
      color: var(--foreground-subtle);
      font-size: 0.82rem;
    }
    .phase-name {
      font-weight: 600;
      font-size: 0.85rem;
    }

    /* ---------- Empty / loading states ---------- */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--foreground-subtle);
      text-align: center;
      padding: 1.5rem 1rem;
      /* Top-align, not center -- prevents pushing run list down */
      justify-content: flex-start;
      padding-top: 2.5rem;
    }
    .main .empty-state {
      /* Main panel empty states can center */
      justify-content: center;
      height: 100%;
      padding-top: 2rem;
    }
    .empty-state p {
      font-size: 0.82rem;
      max-width: 280px;
      margin: 0;
    }

    /* ---------- Live badge ---------- */
    .badge-live {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.05rem 0.45rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent-green);
      border: 1px solid var(--accent-green);
      flex-shrink: 0;
      line-height: 1.4;
    }
    .badge-live::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent-green);
      border-radius: 50% !important;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ---------- Inline toggle buttons (session detail expand/collapse) ---------- */
    .inline-toggle {
      margin-left: 0.35rem;
      padding: 0 0.3rem;
      font-size: 0.75rem;
      background: none;
      border: 1px solid var(--border-default);
      color: var(--foreground-muted);
      cursor: pointer;
      line-height: 1.5;
      font-family: var(--pico-font-family);
    }
    .inline-toggle:hover {
      background: var(--background-muted);
      color: var(--foreground);
    }

    /* ---------- Skip link ---------- */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      z-index: 1000;
      padding: 0.55rem 0.75rem;
      background: var(--accent-green);
      color: var(--background);
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
    }
    .skip-link:focus {
      top: 0.75rem;
    }

    /* ---------- Focus visible ---------- */
    .run-item:focus-visible,
    button:focus-visible,
    details summary:focus-visible,
    .skip-link:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: 2px;
    }

    /* ---------- Reduced motion ---------- */
    @media (prefers-reduced-motion: reduce) {
      .score-bar-fill {
        transition: none;
      }
      .run-item {
        transition: none;
      }
      details summary::before {
        transition: none;
      }
    }

    /* ---------- Responsive ---------- */
    @media (max-width: 768px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border-default);
        max-height: 40vh;
      }
      .main {
        padding: 1rem 0.85rem;
      }
      .score-label { width: 90px; }
      .meta-grid {
        flex-direction: column;
        gap: 0.15rem;
      }
      .meta-card {
        border-right: none;
        padding: 0;
      }
    }
  </style>
</head>
<body x-data="evalViewer()" x-init="init()">
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div class="shell">

    <!-- Sidebar -->
    <nav class="sidebar" aria-label="Run list">
      <div class="sidebar-header">
        <h1>Pi do Eval? 😈😇</h1>
        <small role="status" x-text="runs.length + ' run' + (runs.length !== 1 ? 's' : '')"></small>
      </div>

      <!-- Loading state -->
      <div class="empty-state" x-show="loading" aria-live="polite">
        <p aria-busy="true">Loading runs...</p>
      </div>

      <!-- Error state -->
      <div class="empty-state" x-show="!loading && error" aria-live="assertive">
        <p x-text="error"></p>
      </div>

      <!-- Empty state -->
      <div class="empty-state" x-show="!loading && !error && runs.length === 0">
        <p>No runs yet. Run an eval to see results here.</p>
      </div>

      <!-- Run list -->
      <ul class="run-list" x-show="!loading && runs.length > 0" role="listbox" aria-label="Evaluation runs">
        <template x-for="run in runs" :key="run.dir">
          <li class="run-item"
              :class="{ active: selectedDir === run.dir }"
              role="option"
              :aria-selected="selectedDir === run.dir"
              tabindex="0"
              @click="selectRun(run.dir)"
              @keydown.enter="selectRun(run.dir)"
              @keydown.space.prevent="selectRun(run.dir)">
            <div class="run-item-top">
              <span class="run-item-name" x-text="run.project + '/' + run.variant"></span>
              <span x-show="run.status === 'running'" class="badge-live">Live</span>
              <span x-show="run.status !== 'running'" class="badge"
                    :style="'background-color:' + scoreColor(run.overall)"
                    x-text="run.overall"></span>
            </div>
            <div class="run-item-meta">
              <span x-text="run.variant"></span>
              <span x-text="formatDuration(run.durationMs)"></span>
              <span x-text="formatDate(run.startedAt)"></span>
            </div>
          </li>
        </template>
      </ul>
    </nav>

    <!-- Main area -->
    <main class="main" id="main-content">

      <!-- No selection state -->
      <div class="empty-state" x-show="!selectedDir && !loading">
        <p>Select a run from the sidebar to view its report.</p>
      </div>

      <!-- Report loading -->
      <div class="empty-state" x-show="reportLoading" aria-live="polite">
        <p aria-busy="true">Loading report...</p>
      </div>

      <!-- Report error -->
      <div class="empty-state" x-show="reportError" aria-live="assertive">
        <p x-text="reportError"></p>
      </div>

      <!-- Report content -->
      <div x-show="report && !reportLoading && !reportError">

        <!-- Header -->
        <h2>
          <span x-text="report?.meta?.project"></span><span style="color: var(--foreground-subtle); font-weight: 400;">/</span><span x-text="report?.meta?.variant"></span>
        </h2>

        <!-- Meta grid -->
        <div class="meta-grid">
          <dl class="meta-card">
            <dt>Variant</dt>
            <dd x-text="report?.meta?.variant"></dd>
          </dl>
          <dl class="meta-card">
            <dt>Status</dt>
            <dd x-text="report?.meta?.status"></dd>
          </dl>
          <dl class="meta-card">
            <dt>Duration</dt>
            <dd x-text="formatDuration(report?.meta?.durationMs)"></dd>
          </dl>
          <dl class="meta-card">
            <dt>Started</dt>
            <dd x-text="formatDateTime(report?.meta?.startedAt)"></dd>
          </dl>
          <dl class="meta-card" x-show="report?.meta?.workerModel || report?.meta?.model">
            <dt>Worker Model</dt>
            <dd><code x-text="report?.meta?.workerModel || report?.meta?.model"></code></dd>
          </dl>
          <dl class="meta-card" x-show="report?.meta?.judgeModel">
            <dt>Judge Model</dt>
            <dd><code x-text="report?.meta?.judgeModel"></code></dd>
          </dl>
          <template x-if="report?.session?.tokenUsage && (report.session.tokenUsage.input > 0 || report.session.tokenUsage.output > 0)">
            <dl class="meta-card">
              <dt>Tokens</dt>
              <dd><span x-text="formatNumber(report?.session?.tokenUsage?.input)"></span> in / <span x-text="formatNumber(report?.session?.tokenUsage?.output)"></span> out</dd>
            </dl>
          </template>
        </div>

        <!-- Scores -->
        <div class="content-card" x-show="report?.scores">
          <section aria-label="Scores">
            <h3>Scores</h3>
            <div class="score-layout">
              <div class="score-overall" x-show="report?.scores?.overall != null">
                <span class="score-overall-value"
                      :style="'color:' + scoreColor(report?.scores?.overall)"
                      x-text="report?.scores?.overall"></span>
                <span class="score-overall-label">Overall</span>
              </div>
              <div class="score-bars">
                <div class="score-section">
                  <template x-for="s in scoreRows" :key="s.label">
                    <div class="score-row">
                      <span class="score-label" x-text="s.label"></span>
                      <div class="score-bar-track" role="progressbar" :aria-valuenow="s.value" aria-valuemin="0" aria-valuemax="100" :aria-label="s.label + ' score'">
                        <div class="score-bar-fill" :style="'width:' + s.value + '%; background-color:' + scoreColor(s.value)"></div>
                      </div>
                      <span class="score-value" :style="'color:' + scoreColor(s.value)" x-text="s.value"></span>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </section>
        </div>

        <!-- Findings & Judge -->
        <div class="content-card" x-show="allFindings.length > 0 || report?.judgeResult">

          <!-- Findings -->
          <section x-show="allFindings.length > 0" aria-label="Findings">
            <h3>Findings</h3>
            <ul class="findings-list">
              <template x-for="(f, i) in allFindings" :key="i">
                <li class="finding-item" x-text="f"></li>
              </template>
            </ul>
          </section>

          <!-- Judge reasoning -->
          <section x-show="report?.judgeResult" aria-label="Judge reasoning" :style="allFindings.length > 0 ? 'margin-top: 1.75rem' : ''">
            <h3>Judge Reasoning</h3>
            <div class="reason-list">
              <template x-for="entry in judgeReasonEntries" :key="entry[0]">
                <div class="reason-block">
                  <h4>
                    <span x-text="formatScoreKey(entry[0])"></span>
                    <span class="badge"
                          :style="'margin-left: 0.5rem; font-size: 0.75rem; position: relative; top: -0.1rem; background-color:' + scoreColor(report?.judgeResult?.scores?.[entry[0]])"
                          x-text="report?.judgeResult?.scores?.[entry[0]]"></span>
                  </h4>
                  <p x-text="entry[1]"></p>
                </div>
              </template>
            </div>
          </section>
        </div>

        <!-- Session details -->
        <div class="content-card" x-show="report?.session">
          <section aria-label="Session details">
            <h3>Session</h3>

            <!-- Filter bar -->
            <div class="timeline-filters" x-show="timeline.length > 0">
              <template x-for="k in timelineKinds" :key="k.key">
                <button class="filter-pill"
                        :class="{ active: timelineFilters[k.key] }"
                        @click="timelineFilters[k.key] = !timelineFilters[k.key]"
                        x-text="k.label + ' (' + k.count + ')'"></button>
              </template>
            </div>

            <!-- Unified timeline -->
            <div class="log-list" x-show="filteredTimeline.length > 0">
              <template x-for="(ev, i) in filteredTimeline" :key="i">
                <div class="timeline-row" :class="'kind-' + ev.kind" x-data="{ open: false }">
                  <span class="timeline-ts" x-text="formatTimestamp(ev.timestamp)"></span>
                  <span class="kind-badge" :class="'kind-' + ev.kind" x-text="ev.kind"></span>
                  <div class="timeline-content">
                    <!-- Tool call -->
                    <template x-if="ev.kind === 'tool'">
                      <div>
                        <span class="tool-name" x-text="ev.data.name"></span>
                        <span class="tool-args" x-text="truncate(formatArgs(ev.data.arguments), 120)"></span>
                        <button class="inline-toggle" @click="open = !open"
                                x-text="open ? 'hide' : 'expand'"
                                :aria-expanded="open"></button>
                        <template x-if="open">
                          <div>
                            <div class="tool-result" x-show="ev.data.arguments"><strong>Arguments:</strong>
<span x-text="JSON.stringify(ev.data.arguments, null, 2)"></span></div>
                            <div class="tool-result" x-show="ev.data.resultText" style="margin-top: 0.25rem;"><strong>Result:</strong>
<span x-text="ev.data.resultText"></span></div>
                          </div>
                        </template>
                      </div>
                    </template>
                    <!-- File write -->
                    <template x-if="ev.kind === 'file'">
                      <div style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
                        <span class="file-path" x-text="ev.data.path"></span>
                        <span class="label-tag" x-show="ev.data.tool" x-text="ev.data.tool"></span>
                        <template x-if="ev.data.labels">
                          <span>
                            <template x-for="l in ev.data.labels" :key="l">
                              <span class="label-tag" :class="l" x-text="l"></span>
                            </template>
                          </span>
                        </template>
                        <template x-if="ev.data.classification">
                          <span class="label-tag" :class="ev.data.classification" x-text="ev.data.classification"></span>
                        </template>
                      </div>
                    </template>
                    <!-- Plugin event -->
                    <template x-if="ev.kind === 'plugin'">
                      <div>
                        <span class="tool-name" x-text="ev.data.type"></span>
                        <span class="tool-args" x-text="typeof ev.data.data === 'string' ? ev.data.data : JSON.stringify(ev.data.data)"></span>
                      </div>
                    </template>
                    <!-- Test run -->
                    <template x-if="ev.kind === 'test'">
                      <div>
                        <span :style="'color:' + (ev.data.passed ? 'var(--score-green)' : 'var(--score-red)')"
                              x-text="ev.data.passed ? 'PASS' : 'FAIL'"
                              style="font-weight: 700; font-size: 0.82rem; letter-spacing: 0.03em;"></span>
                        <span style="color: var(--foreground-subtle); margin-left: 0.2rem; font-size: 0.82rem; font-family: var(--pico-font-family-monospace, monospace);"
                              x-text="ev.data.command"></span>
                        <button class="inline-toggle" @click="open = !open"
                                x-text="open ? 'hide' : 'output'"
                                :aria-expanded="open"></button>
                        <div class="tool-result" x-show="open" x-text="ev.data.output"></div>
                      </div>
                    </template>
                    <!-- Phase change -->
                    <template x-if="ev.kind === 'phase'">
                      <div style="display: flex; align-items: center; gap: 0.35rem;">
                        <span class="phase-name" x-text="ev.data.from"></span>
                        <span class="phase-arrow">&#8594;</span>
                        <span class="phase-name" x-text="ev.data.to"></span>
                        <span style="color: var(--foreground-subtle); font-size: 0.8rem;" x-text="'(' + ev.data.trigger + ')'"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </section>
        </div>

      </div>
    </main>

  </div>

  <script>
    function evalViewer() {
      return {
        runs: [],
        selectedDir: null,
        report: null,
        loading: true,
        error: null,
        reportLoading: false,
        reportError: null,
        _liveInterval: null,
        _indexInterval: null,

        async init() {
          try {
            const resp = await fetch('runs/index.json');
            if (!resp.ok) {
              if (resp.status === 404) {
                this.runs = [];
                this.error = null;
              } else {
                throw new Error(`Failed to load runs: ${resp.status}`);
              }
            } else {
              this.runs = await resp.json();
              // Sort newest first by startedAt
              this.runs.sort((a, b) => {
                const da = a.startedAt ? new Date(a.startedAt) : 0;
                const db = b.startedAt ? new Date(b.startedAt) : 0;
                return db - da;
              });
              // Auto-select first run
              if (this.runs.length > 0) {
                this.selectRun(this.runs[0].dir);
              }
            }
            this._startIndexPolling();
          } catch (e) {
            this.error = e.message || 'Failed to load run index.';
          } finally {
            this.loading = false;
          }
        },

        _startIndexPolling() {
          if (this._indexInterval) clearInterval(this._indexInterval);
          const hasRunning = this.runs.some(r => r.status === 'running');
          if (!hasRunning) return;
          this._indexInterval = setInterval(async () => {
            try {
              const resp = await fetch('runs/index.json');
              if (resp.ok) {
                this.runs = await resp.json();
                this.runs.sort((a, b) => {
                  const da = a.startedAt ? new Date(a.startedAt) : 0;
                  const db = b.startedAt ? new Date(b.startedAt) : 0;
                  return db - da;
                });
                if (!this.runs.some(r => r.status === 'running')) {
                  clearInterval(this._indexInterval);
                  this._indexInterval = null;
                }
              }
            } catch {}
          }, 5000);
        },

        async selectRun(dir) {
          if (this.selectedDir === dir && this.report) return;
          this.selectedDir = dir;
          this.report = null;
          this.reportLoading = true;
          this.reportError = null;
          if (this._liveInterval) { clearInterval(this._liveInterval); this._liveInterval = null; }

          const run = this.runs.find(r => r.dir === dir);
          const isLive = run?.status === 'running';

          try {
            if (isLive) {
              await this._fetchLive(dir);
              this._liveInterval = setInterval(() => this._pollLive(dir), 2000);
            } else {
              const resp = await fetch(`runs/${dir}/report.json`);
              if (!resp.ok) throw new Error(`Failed to load report: ${resp.status}`);
              this.report = await resp.json();
            }
          } catch (e) {
            this.reportError = e.message || 'Failed to load report.';
          } finally {
            this.reportLoading = false;
          }
        },

        async _fetchLive(dir) {
          const resp = await fetch(`runs/${dir}/live.json`);
          if (resp.ok) {
            this.report = await resp.json();
          }
        },

        async _pollLive(dir) {
          if (this.selectedDir !== dir) { clearInterval(this._liveInterval); this._liveInterval = null; return; }
          // Check if run completed
          try {
            const reportResp = await fetch(`runs/${dir}/report.json`);
            if (reportResp.ok) {
              this.report = await reportResp.json();
              clearInterval(this._liveInterval);
              this._liveInterval = null;
              // Update run status in sidebar
              const run = this.runs.find(r => r.dir === dir);
              if (run) { run.status = this.report.meta?.status || 'completed'; run.overall = this.report.scores?.overall || 0; }
              this._startIndexPolling();
              this._scrollTimeline();
              return;
            }
          } catch {}
          // Still running — fetch live.json
          await this._fetchLive(dir);
          this._scrollTimeline();
        },

        _scrollTimeline() {
          const list = document.querySelector('.log-list');
          if (list) list.scrollTop = list.scrollHeight;
        },

        // Computed-style getter for score rows
        get scoreRows() {
          if (!this.report?.scores) return [];
          const scores = this.report.scores;
          const rows = [];

          // Handle both nested format (deterministic + judge) and flat format
          if (scores.deterministic) {
            for (const [key, val] of Object.entries(scores.deterministic)) {
              rows.push({ label: this.formatScoreKey(key), value: val, isOverall: false });
            }
          }
          if (scores.judge) {
            for (const [key, val] of Object.entries(scores.judge)) {
              rows.push({ label: this.formatScoreKey(key), value: val, isOverall: false });
            }
          }

          // Flat format — add all keys except "overall"
          if (!scores.deterministic && !scores.judge) {
            for (const [key, val] of Object.entries(scores)) {
              if (key === 'overall') continue;
              rows.push({ label: this.formatScoreKey(key), value: val, isOverall: false });
            }
          }

          return rows;
        },

        // Unified timeline
        timelineFilters: { tool: true, file: true, plugin: true, test: true, phase: true },

        get timeline() {
          const s = this.report?.session;
          if (!s) return [];
          const events = [];
          for (const tc of (s.toolCalls || [])) {
            events.push({ kind: 'tool', timestamp: tc.timestamp, data: tc });
          }
          for (const fw of (s.fileWrites || [])) {
            events.push({ kind: 'file', timestamp: fw.timestamp, data: fw });
          }
          for (const ev of (s.pluginEvents || [])) {
            events.push({ kind: 'plugin', timestamp: ev.timestamp, data: ev });
          }
          for (const tr of (s.testRuns || [])) {
            events.push({ kind: 'test', timestamp: tr.timestamp, data: tr });
          }
          for (const pc of (s.phaseChanges || [])) {
            events.push({ kind: 'phase', timestamp: pc.timestamp, data: pc });
          }
          events.sort((a, b) => a.timestamp - b.timestamp);
          return events;
        },

        get filteredTimeline() {
          return this.timeline.filter(e => this.timelineFilters[e.kind]);
        },

        get timelineKinds() {
          const counts = {};
          for (const e of this.timeline) {
            counts[e.kind] = (counts[e.kind] || 0) + 1;
          }
          return [
            { key: 'tool', label: 'Tool Calls', count: counts.tool || 0 },
            { key: 'file', label: 'File Writes', count: counts.file || 0 },
            { key: 'plugin', label: 'Plugin Events', count: counts.plugin || 0 },
            { key: 'test', label: 'Test Runs', count: counts.test || 0 },
            { key: 'phase', label: 'Phase Changes', count: counts.phase || 0 },
          ].filter(k => k.count > 0);
        },

        get allFindings() {
          const top = this.report?.findings || [];
          const judge = this.report?.judgeResult?.findings || [];
          const seen = new Set(top);
          const merged = [...top];
          for (const f of judge) {
            if (!seen.has(f)) merged.push(f);
          }
          return merged;
        },

        get judgeReasonEntries() {
          const reasons = this.report?.judgeResult?.reasons;
          if (!reasons) return [];
          return Object.entries(reasons);
        },

        // Helpers
        scoreColor(score) {
          if (score == null) return 'var(--foreground-subtle)';
          if (score > 80) return 'var(--score-green)';
          if (score > 50) return 'var(--score-yellow)';
          return 'var(--score-red)';
        },

        formatScoreKey(key) {
          // tddCompliance -> TDD Compliance, test_quality -> Test Quality
          return key
            .replace(/([a-z])([A-Z])/g, '$1 $2')
            .replace(/_/g, ' ')
            .replace(/\b\w/g, c => c.toUpperCase())
            .replace(/\bTdd\b/, 'TDD');
        },

        formatDuration(ms) {
          if (!ms) return '--';
          if (ms < 1000) return ms + 'ms';
          const s = Math.round(ms / 1000);
          if (s < 60) return s + 's';
          const m = Math.floor(s / 60);
          const rem = s % 60;
          return m + 'm ' + rem + 's';
        },

        formatDate(iso) {
          if (!iso) return '--';
          const d = new Date(iso);
          return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        },

        formatDateTime(iso) {
          if (!iso) return '--';
          const d = new Date(iso);
          return d.toLocaleString(undefined, {
            year: 'numeric', month: 'short', day: 'numeric',
            hour: '2-digit', minute: '2-digit', second: '2-digit'
          });
        },

        formatTimestamp(ts) {
          if (!ts) return '--';
          const d = new Date(ts);
          return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        },

        formatArgs(args) {
          if (!args) return '';
          if (typeof args === 'string') return args;
          // For bash commands, show the command directly
          if (args.command) return args.command;
          // For file operations, show the path
          if (args.path) return args.path;
          return JSON.stringify(args);
        },

        truncate(str, len) {
          if (!str) return '';
          if (str.length <= len) return str;
          return str.slice(0, len) + '...';
        },

        formatNumber(n) {
          if (n == null) return '0';
          return n.toLocaleString();
        }
      };
    }
  </script>
</body>
</html>
